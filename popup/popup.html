<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: #1a1a1a;
            color: #ffffff;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        h3 {
            margin: 0 0 8px 0;
            color: #e0e0e0;
            font-size: 16px;
        }
        
        .key-status {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            border-left: 3px solid #ff9800;
        }
        
        .key-status.active {
            border-left-color: #4caf50;
        }
        
        .key-value {
            font-family: monospace;
            background: #1e1e1e;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 6px;
            word-break: break-all;
            font-size: 12px;
            color: #b0b0b0;
        }
        
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #404040;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            background: #2d2d2d;
            color: #ffffff;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #4caf50;
        }
        
        input::placeholder {
            color: #808080;
        }
        
        button {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button.clear-btn {
            background: #f44336;
        }
        
        button.clear-btn:hover {
            background: #d32f2f;
        }
        
        .info {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #333;
        }
        
        .format-hint {
            background: #2d2d2d;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            color: #ccc;
        }
        
        .format-hint code {
            background: #1e1e1e;
            padding: 2px 4px;
            border-radius: 4px;
            color: #ff9800;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
        }
        
        .button-group button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="statusMessage" class="status-message"></div>

<style>
.status-message {
    margin-top: 8px;
    padding: 8px;
    border-radius: 4px;
    font-size: 12px;
    text-align: center;
}
.status-message.success {
    background: #4caf50;
    color: white;
}
.status-message.warning {
    background: #ff9800;
    color: white;
}
.status-message.error {
    background: #f44336;
    color: white;
}
</style>
        <h3>🔐 Шифрование сообщений</h3>
        
        <div class="format-hint">
            Формат зашифрованных сообщений:<br><code>🔒[encrypted]</code>
        </div>
        
        <input type="text" id="keyInput" placeholder="Введите ключ шифрования">
        
        <button id="saveKeyBtn">Сохранить ключ</button>
        
        <div class="key-status" id="keyStatus">
            <div id="keyStatusText">Ключ не установлен</div>
            <div class="key-value" id="keyDisplay"></div>
        </div>
        
        <div class="button-group">
            <button id="clearKeyBtn" class="clear-btn">Очистить ключ</button>
        </div>
        
        <div class="info">

        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
